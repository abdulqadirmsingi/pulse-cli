version: 2
project_name: pulse

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0       # pure Go — no C compiler needed on any platform
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    main: .
    binary: pulse
    ldflags:
      - -s -w
      - -X github.com/devpulse-cli/devpulse/internal/config.AppVersion={{.Version}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "pulse_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: devpulse-cli
    name: devpulse
  name_template: "v{{.Version}}"

changelog:
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^ci:']
