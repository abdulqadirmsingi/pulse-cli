version: 2
project_name: pulse

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0       # pure Go — no C compiler needed on any platform
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    main: .
    binary: pulse
    ldflags:
      - -s -w
      - -X github.com/abdulqadirmsingi/pulse-cli/internal/config.AppVersion={{.Version}}

archives:
  - name_template: "pulse_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: abdulqadirmsingi
    name: pulse-cli

  name_template: "v{{.Version}}"

changelog:
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^ci:']
